name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1-mesa libgles2-mesa

      - name: Install dependencies
        run: npm install

      - name: Debug native-gles
        run: |
          node -e "const gl = require('native-gles'); console.log('createContext:', gl.createContext(64,64)); console.log('info:', gl.getContextInfo()); gl.destroyContext(); console.log('native-gles OK')"
          node -e "import('native-gles').then(m => { const gl = m.default; console.log('ESM createContext:', gl.createContext(64,64)); console.log('info:', gl.getContextInfo()); gl.destroyContext(); console.log('ESM OK') })"
        env:
          EGL_PLATFORM: surfaceless

      - name: Run tests
        run: |
          node test/test-triangle.mjs
          node test/test-all.mjs
        env:
          EGL_PLATFORM: surfaceless
